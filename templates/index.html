<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deepfake Detection System</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        height: 100%;
        font-family: 'Montserrat', sans-serif;
        overflow: hidden;
        background: #0d0d0d;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Canvas for starfield */
    #bgCanvas {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: -1;
    }

    /* Centered container */
    .container {
        width: 450px;
        max-width: 90%;
        padding: 40px 35px;
        border-radius: 20px;
        background: rgba(30,30,30,0.95);
        box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        text-align: center;
        color: #fff;
        z-index: 10;
    }

    h2 {
        font-size: 28px;
        margin-bottom: 10px;
        color: #00e0ff;
        text-shadow: 0 0 8px #00e0ff;
    }

    p.subtitle {
        font-size: 14px;
        color: #aaa;
        margin-bottom: 25px;
    }

    input[type="file"] {
        width: 100%;
        padding: 14px;
        border: 2px dashed #444;
        border-radius: 12px;
        cursor: pointer;
        background: #1e1e1e;
        color: #ccc;
        transition: all 0.3s ease;
    }
    input[type="file"]:hover {
        border-color: #00e0ff;
        background: #262626;
    }

    button {
        margin-top: 20px;
        padding: 14px 25px;
        width: 100%;
        background: linear-gradient(90deg, #00e0ff, #ff00ff);
        color: black;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 0 12px #00e0ff;
    }
    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 20px #00e0ff;
    }

    .result-box {
        margin-top: 25px;
        padding: 20px;
        border-radius: 16px;
        background: #1c1c1c;
        box-shadow: 0 0 12px rgba(0,0,0,0.6);
    }

    .fake { color: #ff4c4c; font-weight: 700; font-size: 20px; }
    .real { color: #2ecc71; font-weight: 700; font-size: 20px; }
    .confidence { margin-top: 10px; font-size: 14px; color: #ccc; }
    .footer { margin-top: 25px; font-size: 12px; color: #666; }
    a button { background: linear-gradient(90deg, #ff00ff, #00e0ff); color: black; }
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div class="container">
    <h2>🎥 Deepfake Video Detection</h2>
    <p class="subtitle">Upload a video to check whether it is Real or Fake</p>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="video" accept="video/*" required>
        <button type="submit">Analyze Video</button>
    </form>

    {% if result %}
    <div class="result-box">
        <div class="{{ 'fake' if result == 'FAKE' else 'real' }}">
            {{ result }}
        </div>
        <div class="confidence">
            Confidence: {{ confidence }}%
        </div>
    </div>
    {% endif %}

    <a href="/dashboard">
        <button type="button">View Dashboard</button>
    </a>

    <div class="footer">
        Final Year Project • Real-Time Deepfake Detection
    </div>
</div>

<script>
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = [];
const numStars = 300;

for (let i = 0; i < numStars; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        z: Math.random() * canvas.width,
    });
}

function drawStars() {
    ctx.fillStyle = "#0d0d0d";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < numStars; i++) {
        const star = stars[i];
        star.z -= 2;
        if (star.z <= 0) star.z = canvas.width;

        const sx = (star.x - canvas.width/2) * (canvas.width/star.z) + canvas.width/2;
        const sy = (star.y - canvas.height/2) * (canvas.width/star.z) + canvas.height/2;
        const radius = (canvas.width - star.z) / 150;

        ctx.beginPath();
        ctx.arc(sx, sy, radius, 0, Math.PI*2);
        ctx.fillStyle = "#00e0ff";
        ctx.fill();
    }
    requestAnimationFrame(drawStars);
}

drawStars();
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
