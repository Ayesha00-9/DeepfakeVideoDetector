<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard | Deepfake Detection</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        height: 100%;
        font-family: 'Montserrat', sans-serif;
        overflow: hidden;
        background: #0d0d0d;
        color: #fff;
    }

    /* Canvas for starfield background */
    #bgCanvas {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: -1;
    }

    /* Sidebar */
    .sidebar {
        position: fixed;
        width: 250px;
        height: 100%;
        background: rgba(20,20,20,0.95);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 30px;
        box-shadow: 5px 0 30px rgba(0,0,0,0.7);
        z-index: 10;
    }
    .sidebar h2 {
        font-size: 26px;
        margin-bottom: 40px;
        color: #00e0ff;
        text-shadow: 0 0 8px #00e0ff;
    }
    .sidebar a {
        display: block;
        width: 90%;
        padding: 14px 0;
        margin-bottom: 10px;
        text-align: center;
        color: #ccc;
        text-decoration: none;
        font-size: 16px;
        border-radius: 10px;
        transition: 0.3s;
    }
    .sidebar a:hover {
        background: rgba(0,224,255,0.2);
        color: #00e0ff;
        text-shadow: 0 0 6px #00e0ff;
    }

    /* Main content */
    .main {
        margin-left: 250px;
        padding: 40px 50px;
        z-index: 10;
        position: relative;
    }
    .header {
        font-size: 28px;
        margin-bottom: 30px;
        color: #00e0ff;
        text-shadow: 0 0 8px #00e0ff;
    }

    /* Cards */
    .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 25px;
    }
    .card {
        background: rgba(30,30,30,0.95);
        padding: 25px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 15px 50px rgba(0,0,0,0.7);
        transition: 0.3s;
        position: relative;
        color: #fff;
    }
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 25px 60px rgba(0,0,0,0.8);
    }
    .card h3 {
        font-size: 36px;
        color: #00e0ff;
        text-shadow: 0 0 6px #00e0ff;
    }
    .card p {
        font-size: 14px;
        color: #aaa;
        margin-top: 8px;
    }
    .card::after {
        content: "";
        position: absolute;
        width: 100%;
        height: 6px;
        bottom: 0;
        left: 0;
        background: linear-gradient(90deg, #00e0ff, #ff00ff);
        border-radius: 0 0 20px 20px;
    }

    /* Buttons */
    .btn {
        display: inline-block;
        margin-top: 35px;
        padding: 14px 30px;
        background: linear-gradient(90deg, #00e0ff, #ff00ff);
        color: black;
        text-decoration: none;
        font-size: 16px;
        font-weight: 600;
        border-radius: 12px;
        box-shadow: 0 0 12px #00e0ff;
        transition: 0.3s;
    }
    .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 0 20px #00e0ff;
    }
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div class="sidebar">
    <h2>DeepTrace</h2>
    <a href="/">Dashboard</a>
    <a href="/detect">Detection</a>
</div>

<div class="main">
    <div class="header">System Overview</div>
    <div class="cards">
        <div class="card">
            <h3>{{ total_videos }}</h3>
            <p>Total Videos Analyzed</p>
        </div>
        <div class="card">
            <h3>{{ fake_count }}</h3>
            <p>Fake Videos Detected</p>
        </div>
        <div class="card">
            <h3>{{ real_count }}</h3>
            <p>Real Videos Detected</p>
        </div>
        <div class="card">
            <h3>{{ accuracy }}%</h3>
            <p>Model Accuracy</p>
        </div>
    </div>
    <a href="/detect" class="btn">Start Video Detection</a>
</div>

<script>
// Animated starfield background
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = [];
const numStars = 300;

for (let i = 0; i < numStars; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        z: Math.random() * canvas.width,
    });
}

function drawStars() {
    ctx.fillStyle = "#0d0d0d";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < numStars; i++) {
        const star = stars[i];
        star.z -= 2;
        if (star.z <= 0) star.z = canvas.width;

        const sx = (star.x - canvas.width/2) * (canvas.width/star.z) + canvas.width/2;
        const sy = (star.y - canvas.height/2) * (canvas.width/star.z) + canvas.height/2;
        const radius = (canvas.width - star.z) / 150;

        ctx.beginPath();
        ctx.arc(sx, sy, radius, 0, Math.PI*2);
        ctx.fillStyle = "#00e0ff";
        ctx.fill();
    }
    requestAnimationFrame(drawStars);
}

drawStars();
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
